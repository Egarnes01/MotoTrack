<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotoTrack</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MotoTrack</h1>
      <p>Track maintenance, mileage, and upcoming service intervals.</p>
    </div>
    <button id="logoutBtn" class="secondary hidden">Logout</button>
  </header>

  <main class="container">
    <section id="authSection" class="grid two-col">
      <div class="card">
        <h2>Create Account</h2>
        <form id="registerForm">
          <input type="text" name="name" placeholder="Full name" required />
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit">Register</button>
        </form>
      </div>

      <div class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
      </div>
    </section>

    <section id="appSection" class="hidden">
      <div class="grid two-col">
        <div class="card">
          <h2>Add Motorcycle</h2>
          <form id="motorcycleForm">
            <input type="text" name="nickname" placeholder="Nickname (e.g. My ZX-10R)" required />
            <input type="text" name="make" placeholder="Make" required />
            <input type="text" name="model" placeholder="Model" required />
            <input type="number" name="year" placeholder="Year" required />
            <input type="number" name="current_mileage" placeholder="Current mileage" required />
            <input type="text" name="vin" placeholder="VIN (optional)" />
            <textarea name="notes" placeholder="Notes (optional)"></textarea>
            <button type="submit">Save Motorcycle</button>
          </form>
        </div>

        <div class="card">
          <h2>Add Maintenance Log</h2>
          <form id="maintenanceForm">
            <select name="motorcycle_id" id="maintenanceMotorcycle" required>
              <option value="">Select motorcycle</option>
            </select>
            <input type="text" name="service_type" placeholder="Service type" required />
            <input type="date" name="service_date" required />
            <input type="number" name="mileage_at_service" placeholder="Mileage at service" required />
            <input type="number" name="cost" step="0.01" placeholder="Cost (optional)" />
            <input type="number" name="interval_miles" placeholder="Next due in miles (optional)" />
            <input type="number" name="interval_days" placeholder="Next due in days (optional)" />
            <textarea name="notes" placeholder="Notes (optional)"></textarea>
            <button type="submit">Save Maintenance Log</button>
          </form>
        </div>
      </div>

      <section class="grid two-col gap-top">
        <div class="card">
          <h2>Your Motorcycles</h2>
          <div id="motorcycleList" class="stack"></div>
        </div>

        <div class="card">
          <h2>Dashboard</h2>
          <div id="dashboardList" class="stack"></div>
        </div>
      </section>
    </section>

    <div id="toast" class="toast hidden"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
